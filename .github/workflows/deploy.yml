name: Deploy hasi-cad to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          status=$(curl -sS -o /tmp/get.json -w "%{http_code}" \
            "${api}/hasi-cad" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "GET status: ${status}"
          if [ "${status}" = "200" ]; then
            echo "Project hasi-cad already exists."
          elif [ "${status}" = "404" ]; then
            echo "Creating project hasi-cad..."
            curl -sS -o /tmp/create.json -w "POST status: %{http_code}\n" \
              -X POST "${api}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"hasi-cad","production_branch":"main"}'
            cat /tmp/create.json
            echo
            python3 -c "import json,sys; d=json.load(open('/tmp/create.json')); sys.exit(0 if d.get('success') else 1)"
          else
            echo "Unexpected GET status ${status}:"
            cat /tmp/get.json
            exit 1
          fi
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          command: pages deploy dist --project-name=hasi-cad --branch=main --commit-dirty=true
