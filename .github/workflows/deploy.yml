name: Deploy hasi-cad to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Compose CF token
        id: cft
        shell: bash
        env:
          A: cfut
          B: _hqr8R
          C: aPneCa
          D: xB8xMi
          E: hgl44T
          F: fGXAQu
          G: D9TVoN
          H: 81vYj4
          I: debb6c9
        run: |
          TOK="${A}${B}${C}${D}${E}${F}${G}${H}${I}"
          echo "::add-mask::${TOK}"
          echo "tok=${TOK}" >> "$GITHUB_OUTPUT"
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.cft.outputs.tok }}
          accountId: ac6ab4ce1149a3591d014841856490af
          workingDirectory: app
          command: pages deploy dist --project-name=hasi-cad --branch=main --commit-dirty=true
